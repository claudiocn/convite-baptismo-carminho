<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="light">
    <meta name="theme-color" content="#dfb3b5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <title>Convite de Batismo - Carminho Novais</title>
    
    <meta property="og:title" content="Convite de Batismo - Carminho Novais">
    <meta property="og:description" content="Junte-se a nós para celebrar este dia especial. Sábado, 30 de Maio de 2026.">
    <meta property="og:image" content="https://baptismo-carminho.thenovais.com/thumbnail.html">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">
    
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Montserrat:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    
        <link rel="stylesheet" href="css/style.css">
    
</head>
<body>

<div class="invitation-card" id="main-card">
  <div class="inner-frame">
    
    <div class="top-ornament">
      <svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
        <path d="M45,10 L45,45 L10,45 L10,55 L45,55 L45,140 L55,140 L55,55 L90,55 L90,45 L55,45 L55,10 Z" />
        <circle cx="50" cy="50" r="15" fill="none" stroke="currentColor" stroke-width="2"/>
      </svg>
    </div>

    <div class="intro-text">Please join us for the</div>
    <h1 class="event-type">Batismo</h1>
    <div class="intro-text">of our daughter</div>
    
    <h2 class="child-name">Carminho<br>Novais</h2>

    <div class="date-time">
      Sábado, 30 de Maio de 2026<br>às 11H00
    </div>

    <div class="locations">
      
        <div class="location-block" onclick="toggleDetails('cerimonia-details', this)">
          <h4>Igreja Matriz de Barcelos</h4>
          <div id="cerimonia-details" class="hidden-details">
            <p>Rua Dr. Miguel Fonseca, Barcelos</p>
            
              <a href="https://www.google.com/maps/search/?api=1&amp;query=Igreja+Matriz+de+Barcelos" target="_blank" class="map-btn">Ver no Mapa</a>
            
          </div>
        </div>
      

      
        <div class="location-block" onclick="toggleDetails('rececao-details', this)">
          <div class="script-subtitle">MOCHO Guest Farm</div>
          <div id="rececao-details" class="hidden-details">
            <p>Rua da Silveira nº 161, Alheira</p>
            
              <a href="https://maps.app.goo.gl/GiBwYpsUk5NX7UDk9" target="_blank" class="map-btn">Ver no Mapa</a>
            
          </div>
        </div>
      
    </div>

    <div class="rsvp">
      <div>Please RSVP</div>
      
        <div class="rsvp-links">
          
            <a href="https://wa.me/351927070805">Cláudio 927 070 805</a>
          
            <a href="https://wa.me/351925802578">Tânia 925 802 578</a>
          
        </div>
      
    </div>

  </div>
</div>

<script>
    /* O teu código JS existente fica exatamente igual aqui */
    const card = document.getElementById('main-card');
    function revealCard() { card.classList.add('reveal'); }
    document.fonts.ready.then(() => { setTimeout(revealCard, 100); });
    setTimeout(revealCard, 600);
    function toggleDetails(id, element) {
        const details = document.getElementById(id);
        const arrow = element.querySelector('.arrow');
        if (details.classList.contains('open')) {
            details.classList.remove('open');
            arrow.style.transform = 'rotate(0deg)';
        } else {
            details.classList.add('open');
            arrow.style.transform = 'rotate(180deg)';
        }
    }
</script>

</body>
</html>
