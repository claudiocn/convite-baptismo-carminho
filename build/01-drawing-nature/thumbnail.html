    <meta property="og:image" content="https://baptismo-carminho.thenovais.com/thumbnail.html">

        <link rel="stylesheet" href="css/style.css">
    
        <link rel="stylesheet" href="css/thumbnail.css">
    
</head>
<body>

<div class="invitation-thumbnail corrected-thumbnail" id="main-card">
  <div class="thumbnail-overlay-left"></div>
  
  <div class="content-wrapper">
    <header class="card-header corrected-header">
      <div class="join-us-corrected text-smallcaps">join us for the</div>
      <div class="cross-icon corrected-cross">&#x271D;</div>
      <h1 class="event-type-corrected">BAPTISM</h1>
      <div class="of-our-daughter-corrected text-smallcaps">of our daughter</div>
    </header>

    <section class="name-section corrected-name-section">
      <div class="honoree-name-corrected text-script">Carminho Novais</div>
    </section>

    <section class="date-time-section corrected-date-time">
      <div class="date-block-corrected">
        Sábado, 30 de Maio de 2026 às 11H00
      </div>
    </section>
  </div>
</div>

<script>
    /* O teu código JS existente fica exatamente igual aqui */
    const card = document.getElementById('main-card');
    function revealCard() { card.classList.add('reveal'); }
    document.fonts.ready.then(() => { setTimeout(revealCard, 100); });
    setTimeout(revealCard, 600);
    function toggleDetails(id, element) {
        const details = document.getElementById(id);
        const arrow = element.querySelector('.arrow');
        if (details.classList.contains('open')) {
            details.classList.remove('open');
            arrow.style.transform = 'rotate(0deg)';
        } else {
            details.classList.add('open');
            arrow.style.transform = 'rotate(180deg)';
        }
    }
</script>

</body>
</html>
