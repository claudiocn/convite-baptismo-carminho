</head>
<body>

<div class="invitation-card corrected-template" id="main-card">
  
  <div class="corrected-content-wrapper">
    
    <header class="card-header corrected-header">
      <div class="join-us-corrected text-smallcaps">join us for the</div>
      <div class="cross-icon corrected-cross">&#x271D;</div>
      <h1 class="event-type-corrected">BAPTISM</h1>
      <div class="of-our-daughter-corrected text-smallcaps">of our daughter</div>
    </header>

    <section class="name-section corrected-name-section">
      <div class="honoree-name-corrected text-script">Carminho Novais</div>
    </section>

    <section class="date-time-section corrected-date-time">
      <div class="date-block-corrected">
        <span class="date-main">JUN | 27 | SUN</span>
        <span class="time-sub">at eleven o'clock</span>
      </div>
    </section>

    <section class="central-info-section corrected-central-info">
      <div class="location-details-corrected">
        <h3 class="location-name">Igreja Matriz de Barcelos</h3>
        <p class="location-address">Rua Dr. Miguel Fonseca, Barcelos</p>
        <a href="https://www.google.com/maps/search/?api=1&amp;query=Igreja+Matriz+de+Barcelos" class="map-link" target="_blank">Ver no Mapa</a>
      </div>

      <div class="rsvp-and-contact-corrected">
        <div class="rsvp-header-line text-smallcaps">kindly rsvp to</div>
        <div class="contact-line-corrected">
          <a href="https://wa.me/351927070805" class="contact-link">Cláudio 927 070 805</a>
        </div>
      </div>

      <div class="reception-line-corrected text-script">reception to follow</div>
    </section>

  </div>

</div>

<script>
    /* O teu código JS existente fica exatamente igual aqui */
    const card = document.getElementById('main-card');
    function revealCard() { card.classList.add('reveal'); }
    document.fonts.ready.then(() => { setTimeout(revealCard, 100); });
    setTimeout(revealCard, 600);
    function toggleDetails(id, element) {
        const details = document.getElementById(id);
        const arrow = element.querySelector('.arrow');
        if (details.classList.contains('open')) {
            details.classList.remove('open');
            arrow.style.transform = 'rotate(0deg)';
        } else {
            details.classList.add('open');
            arrow.style.transform = 'rotate(180deg)';
        }
    }
</script>

</body>
</html>
