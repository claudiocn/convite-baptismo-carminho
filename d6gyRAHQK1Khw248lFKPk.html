<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Convites Carminho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #f8fafc; font-family: 'Montserrat', sans-serif; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="p-4 md:p-8 text-slate-700">

    <div class="max-w-6xl mx-auto" x-data="adminPanel()" x-init="fetchData()">
        <header class="mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-semibold">Tracking de Convites</h1>
                <p class="text-sm text-slate-500">Baptismo da Carminho Novais</p>
            </div>
            <button @click="fetchData()" class="bg-white border border-slate-300 px-3 py-1.5 rounded-lg shadow-sm hover:bg-slate-50 text-sm transition">
                Atualizar
            </button>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 text-center">
            <div class="bg-white p-3 rounded-lg shadow-sm border border-slate-200">
                <span class="block text-[10px] text-slate-400 uppercase tracking-wide">Total</span>
                <span class="text-xl font-semibold" x-text="lista.length"></span>
            </div>
            <div class="bg-green-50 p-3 rounded-lg shadow-sm border border-green-200">
                <span class="block text-[10px] text-green-600 uppercase tracking-wide">Confirmados</span>
                <span class="text-xl font-semibold text-green-700" x-text="lista.filter(i => i.status === 'confirmado').length"></span>
            </div>
            <div class="bg-red-50 p-3 rounded-lg shadow-sm border border-red-200">
                <span class="block text-[10px] text-red-600 uppercase tracking-wide">Recusados</span>
                <span class="text-xl font-semibold text-red-700" x-text="lista.filter(i => i.status === 'recusado').length"></span>
            </div>
            <div class="bg-slate-100 p-3 rounded-lg shadow-sm border border-slate-300">
                <span class="block text-[10px] text-slate-500 uppercase tracking-wide">Vistos</span>
                <span class="text-xl font-semibold text-slate-700" x-text="lista.filter(i => i.visto).length"></span>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-md border border-slate-200 overflow-hidden">
            <table class="w-full text-left border-collapse text-sm">
                <thead class="bg-slate-100 text-slate-500 text-[10px] uppercase tracking-wider hidden md:table-header-group">
                    <tr>
                        <th class="px-4 py-2">Convidado / Família</th>
                        <th class="px-4 py-2">Estado</th>
                        <th class="px-4 py-2 text-center">Vistas</th>
                        <th class="px-4 py-2">Última Visita</th>
                        <th class="px-4 py-2">Prioridade</th>
                    </tr>
                </thead>
                
                <template x-for="item in listaOrdenada" :key="item.id">
                    <tbody class="border-b border-slate-200 md:border-slate-100 block md:table-row-group">
                        
                        <tr class="hover:bg-slate-50 transition cursor-pointer flex flex-col md:table-row py-2 md:py-0" @click="toggleRow(item.id)">
                            
                            <td class="px-4 py-2 flex justify-between items-center md:table-cell">
                                <span class="md:hidden text-[10px] font-semibold text-slate-400 uppercase">Convidado</span>
                                <div class="text-right md:text-left">
                                    <div class="text-slate-800 font-medium md:font-normal" x-text="item.nome_convite || item.nome"></div>
                                    <div class="text-[10px] text-slate-400" x-text="item.id"></div>
                                </div>
                            </td>
                            
                            <td class="px-4 py-2 flex justify-between items-center md:table-cell border-t border-slate-50 md:border-none">
                                <span class="md:hidden text-[10px] font-semibold text-slate-400 uppercase">Estado</span>
                                <span class="px-2 py-0.5 rounded text-[10px] uppercase tracking-wider font-medium" 
                                      :class="{
                                          'bg-green-100 text-green-700': item.status === 'confirmado',
                                          'bg-red-100 text-red-700': item.status === 'recusado',
                                          'bg-slate-100 text-slate-500': item.status === 'pendente'
                                      }"
                                      x-text="item.status">
                                </span>
                            </td>
                            
                            <td class="px-4 py-2 flex justify-between items-center md:table-cell border-t border-slate-50 md:border-none md:text-center text-slate-500">
                                <span class="md:hidden text-[10px] font-semibold text-slate-400 uppercase">Vistas</span>
                                <span x-text="item.historico_vistas?.length || 0"></span>
                            </td>
                            
                            <td class="px-4 py-2 flex justify-between items-center md:table-cell border-t border-slate-50 md:border-none text-xs text-slate-500">
                                <span class="md:hidden text-[10px] font-semibold text-slate-400 uppercase">Última Visita</span>
                                <span x-text="formatarDataHora(item.historico_vistas?.[item.historico_vistas.length - 1])"></span>
                            </td>
                            
                            <td class="px-4 py-2 flex justify-between items-center md:table-cell border-t border-slate-50 md:border-none">
                                <span class="md:hidden text-[10px] font-semibold text-slate-400 uppercase">Prioridade</span>
                                <span class="text-[10px] px-2 py-0.5 rounded border" 
                                      :class="item.tipo === 'Mandatório' ? 'border-orange-200 text-orange-600 bg-orange-50' : 'border-slate-200 text-slate-400'"
                                      x-text="item.tipo">
                                </span>
                            </td>
                        </tr>
                        
                        <tr x-show="expandedId === item.id" x-cloak class="block md:table-row bg-slate-50 md:border-t border-dashed border-slate-200">
                            <td colspan="5" class="block md:table-cell px-4 py-4 border-l-2 md:border-l-2 border-indigo-400">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <h4 class="text-[10px] text-slate-400 uppercase tracking-wider mb-2">Histórico de Acessos</h4>
                                        <ul class="text-xs space-y-1 max-h-32 overflow-y-auto pr-2">
                                            <template x-for="data in item.historico_vistas" :key="data">
                                                <li class="flex justify-between border-b border-slate-100 pb-1">
                                                    <span x-text="formatarDataHora(data)"></span>
                                                    <span class="text-slate-400">visto</span>
                                                </li>
                                            </template>
                                            <template x-if="!item.historico_vistas?.length">
                                                <li class="text-slate-400 italic">Nenhum acesso registado.</li>
                                            </template>
                                        </ul>
                                    </div>
                                    <div>
                                        <h4 class="text-[10px] text-slate-400 uppercase tracking-wider mb-2">Logs de Resposta</h4>
                                        <ul class="text-xs space-y-1">
                                            <template x-for="resp in item.historico_respostas" :key="resp.data">
                                                <li class="flex justify-between border-b border-slate-100 pb-1">
                                                    <span x-text="formatarDataHora(resp.data)"></span>
                                                    <span class="uppercase text-[10px] font-medium" :class="resp.status === 'confirmado' ? 'text-green-600' : 'text-red-600'" x-text="resp.status"></span>
                                                </li>
                                            </template>
                                            <template x-if="!item.historico_respostas?.length">
                                                <li class="text-slate-400 italic">Ainda sem respostas registadas.</li>
                                            </template>
                                        </ul>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </template>
            </table>
        </div>
    </div>

    <script>
        function adminPanel() {
            return {
                lista: [],
                expandedId: null,
                async fetchData() {
                    try {
                        const res = await fetch('/api/admin');
                        this.lista = await res.json();
                    } catch (e) {
                        console.error("Erro ao carregar dados", e);
                    }
                },
                get listaOrdenada() {
                    return [...this.lista].sort((a, b) => {
                        if (a.tipo === b.tipo) return 0;
                        return a.tipo === 'Mandatório' ? -1 : 1;
                    });
                },
                toggleRow(id) {
                    this.expandedId = this.expandedId === id ? null : id;
                },
                formatarDataHora(isoString) {
                    if (!isoString) return 'Nunca';
                    const data = new Date(isoString);
                    if (isNaN(data.getTime())) return 'Nunca'; 
                    return data.toLocaleDateString('pt-PT') + ' às ' + data.toLocaleTimeString('pt-PT', {hour: '2-digit', minute:'2-digit'});
                }
            }
        }
    </script>
</body>
</html>
